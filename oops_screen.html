<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#1a1d21;}

  .oops-sub{font-size:15px;color:#ababad;text-align:center;max-width:520px;line-height:1.6;}
  .oops-note{font-size:13px;color:#ababad;margin-top:6px;}
</style>
<div id="oops-root">
  <div class="oops-icon">⚠️</div>
